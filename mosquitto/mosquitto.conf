# Mosquitto broker configuration — local/dev profile.
# For production, enable authentication and TLS listeners.

# ── MQTT listener ─────────────────────────────────────────────────────────────
listener 1883
allow_anonymous true

# ── WebSockets listener ───────────────────────────────────────────────────────
listener 9001
protocol websockets

# ── Persistence ───────────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ───────────────────────────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
